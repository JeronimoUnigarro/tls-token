<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #fff;
    }

    header {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
    }

    input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: white;
    }

    .container {
        padding: 40px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
    }

    .card {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 20px;
        transition: 0.3s;
        backdrop-filter: blur(10px);
    }

    .card:hover {
        transform: translateY(-8px);
    }

    .badge {
        float: right;
        background: #22c55e;
        padding: 5px 10px;
        border-radius: 10px;
        font-size: 12px;
    }

    .btn {
        margin-top: 10px;
        padding: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        width: 100%;
    }

    .view {
        background: #3b82f6;
        color: white;
    }

    .download {
        background: #22c55e;
        color: white;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        color: black;
        padding: 20px;
        border-radius: 10px;
        width: 80%;
        max-width: 600px;
    }

    .close {
        float: right;
        cursor: pointer;
        font-size: 20px;
    }
</style>
</head>

<body>

<header>
    <h2>📜 Mis Certificados</h2>
    <input type="text" id="search" placeholder="Buscar certificado...">
</header>

<div class="container">
    <div class="grid" id="certificates">

        <div class="card" data-name="software">
            <span class="badge">Validado</span>
            <h3>Ingeniería de Software</h3>
            <p>Certificación profesional</p>
            <button class="btn view" onclick="openModal('Ingeniería de Software')">Ver</button>
            <button class="btn download" onclick="downloadCert()">Descargar</button>
        </div>

        <div class="card" data-name="web">
            <span class="badge">Validado</span>
            <h3>Desarrollo Web</h3>
            <p>HTML, CSS y JavaScript</p>
            <button class="btn view" onclick="openModal('Desarrollo Web')">Ver</button>
            <button class="btn download" onclick="downloadCert()">Descargar</button>
        </div>

        <div class="card" data-name="db">
            <span class="badge">Validado</span>
            <h3>Bases de Datos</h3>
            <p>SQL y modelado</p>
            <button class="btn view" onclick="openModal('Bases de Datos')">Ver</button>
            <button class="btn download" onclick="downloadCert()">Descargar</button>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p>Vista previa del certificado</p>
    </div>
</div>

<script>
    const search = document.getElementById("search");

    search.addEventListener("keyup", function() {
        let filter = search.value.toLowerCase();
        let cards = document.querySelectorAll(".card");

        cards.forEach(card => {
            let text = card.getAttribute("data-name");
            card.style.display = text.includes(filter) ? "block" : "none";
        });
    });

    function openModal(name) {
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalTitle").innerText = name;
    }

    function closeModal() {
        document.getElementById("modal").style.display = "none";
    }

    function downloadCert() {
        alert("Descargando certificado...");
    }
</script>

</body>
</html>
